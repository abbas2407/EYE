name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Set Gradle permissions
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Remove Sonatype snapshots repo (consistently returns 504)
        working-directory: mobile/android
        run: |
          find . -name "*.gradle" | xargs grep -l "sonatype" 2>/dev/null | while read f; do
            sed -i '/sonatype/Id' "$f"
            echo "Patched: $f"
          done

      - name: Configure Gradle caching
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build Release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FieldPulse-APK
          path: mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Print APK location
        run: find mobile/android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"
