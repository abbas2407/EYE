name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Set Gradle permissions
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Remove Sonatype snapshots repo from all Gradle files
        working-directory: mobile
        run: |
          python3 << 'EOF'
          import os, re

          def remove_sonatype(content):
              # Remove maven { ... } blocks that reference sonatype (single and multi-line)
              return re.sub(
                  r'[ \t]*maven\s*\{[^{}]*sonatype[^{}]*\}\n?',
                  '',
                  content,
                  flags=re.IGNORECASE | re.DOTALL
              )

          search_dirs = [
              'android',
              'node_modules/@react-native/gradle-plugin',
          ]

          for search_dir in search_dirs:
              for root, dirs, files in os.walk(search_dir):
                  dirs[:] = [d for d in dirs if d not in ('.git', 'build', '.gradle')]
                  for filename in files:
                      if filename.endswith('.gradle') or filename.endswith('.gradle.kts'):
                          path = os.path.join(root, filename)
                          try:
                              with open(path, 'r', encoding='utf-8') as f:
                                  content = f.read()
                              cleaned = remove_sonatype(content)
                              if cleaned != content:
                                  with open(path, 'w', encoding='utf-8') as f:
                                      f.write(cleaned)
                                  print(f'Patched: {path}')
                          except Exception as e:
                              print(f'Skip {path}: {e}')
          EOF

      - name: Block Sonatype via Gradle init script (fallback)
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/no-sonatype.gradle << 'INITEOF'
          def blockSonatype = { repos ->
            try {
              repos.removeIf { repo ->
                repo instanceof org.gradle.api.artifacts.repositories.MavenArtifactRepository &&
                repo.url.toString().contains("sonatype")
              }
            } catch (Exception ignored) {}
          }
          settingsEvaluated { settings ->
            blockSonatype(settings.pluginManagement.repositories)
            try { blockSonatype(settings.dependencyResolutionManagement.repositories) } catch (Exception ignored) {}
          }
          allprojects {
            afterEvaluate { project ->
              blockSonatype(project.buildscript.repositories)
              blockSonatype(project.repositories)
            }
          }
          INITEOF

      - name: Configure Gradle caching
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build Release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FieldPulse-APK
          path: mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Print APK location
        run: find mobile/android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"
