name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Block Sonatype via Gradle init script (runs before everything)
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/no-sonatype.gradle << 'INITEOF'
          // Remove sonatype from every repository list in every project/settings
          // Uses repositories.all{} which intercepts repos added at any time
          def sonatypeFilter = { repos ->
            repos.all { repo ->
              if (repo instanceof MavenArtifactRepository &&
                  repo.url.toString().toLowerCase().contains("sonatype")) {
                repos.remove(repo)
              }
            }
          }

          gradle.settingsEvaluated { settings ->
            sonatypeFilter(settings.pluginManagement.repositories)
            try {
              sonatypeFilter(settings.dependencyResolutionManagement.repositories)
            } catch (Exception ignored) {}
          }

          gradle.allprojects { proj ->
            proj.buildscript.repositories { handler ->
              handler.all { repo ->
                if (repo instanceof MavenArtifactRepository &&
                    repo.url.toString().toLowerCase().contains("sonatype")) {
                  handler.remove(repo)
                }
              }
            }
            proj.repositories { handler ->
              handler.all { repo ->
                if (repo instanceof MavenArtifactRepository &&
                    repo.url.toString().toLowerCase().contains("sonatype")) {
                  handler.remove(repo)
                }
              }
            }
          }
          INITEOF

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Set Gradle permissions
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Remove Sonatype from Gradle files (belt-and-suspenders)
        working-directory: mobile
        run: |
          python3 << 'EOF'
          import os, re

          def remove_sonatype(content):
              # Single-line: maven { url "https://...sonatype..." }
              content = re.sub(
                  r'[ \t]*maven\s*\{[^{}]*sonatype[^{}]*\}\n?',
                  '',
                  content,
                  flags=re.IGNORECASE | re.DOTALL
              )
              # Just a URL line inside a maven block
              content = re.sub(
                  r'[ \t]*url\s*["\']?https?://[^"\']*sonatype[^"\']*["\']?\n?',
                  '',
                  content,
                  flags=re.IGNORECASE
              )
              return content

          search_dirs = [
              'android',
              'node_modules/@react-native/gradle-plugin',
              'node_modules/react-native/android',
          ]

          for search_dir in search_dirs:
              for root, dirs, files in os.walk(search_dir):
                  dirs[:] = [d for d in dirs if d not in ('.git', 'build', '.gradle')]
                  for filename in files:
                      if filename.endswith('.gradle') or filename.endswith('.gradle.kts'):
                          path = os.path.join(root, filename)
                          try:
                              with open(path, 'r', encoding='utf-8') as f:
                                  content = f.read()
                              cleaned = remove_sonatype(content)
                              if cleaned != content:
                                  with open(path, 'w', encoding='utf-8') as f:
                                      f.write(cleaned)
                                  print(f'Patched: {path}')
                          except Exception as e:
                              print(f'Skip {path}: {e}')

          # Verify
          print("\n=== Remaining sonatype refs ===")
          import subprocess
          for d in search_dirs:
              r = subprocess.run(
                  ['grep', '-r', 'sonatype', d, '--include=*.gradle', '--include=*.gradle.kts', '-l'],
                  capture_output=True, text=True
              )
              if r.stdout.strip():
                  print(f"STILL FOUND in {d}:\n{r.stdout}")
              else:
                  print(f"Clean: {d}")
          EOF

      - name: Configure Gradle caching
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build Release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Find APK path
        id: apk
        run: |
          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldPulse-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: steps.apk.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "FieldPulse APK — Build #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.path }}
          body: |
            **Auto-built APK**
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
