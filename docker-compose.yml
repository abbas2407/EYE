services:
  fieldpulse-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldpulse-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DB_PATH=/app/data/fieldpulse.db
      - UPLOAD_DIR=/app/data/uploads
      - BASE_URL=https://fp.cyberlink.co.in
      - JWT_SECRET=fieldpulse-jwt-secret-2024-cyberlink
    volumes:
      - fieldpulse_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  fieldpulse-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: fieldpulse-admin
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - fieldpulse-api

  caddy:
    image: caddy:2-alpine
    container_name: fieldpulse-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - fieldpulse-api
      - fieldpulse-admin

volumes:
  fieldpulse_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
