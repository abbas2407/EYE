services:
  fieldpulse-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldpulse-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DB_PATH=/app/data/fieldpulse.db
      - UPLOAD_DIR=/app/data/uploads
      - BASE_URL=https://fp.cyberlink.co.in
      - JWT_SECRET=fieldpulse-jwt-secret-2024-cyberlink
      - GEOAPIFY_KEY=58776059a2734444a13b6f1a862b765a
    volumes:
      - fieldpulse_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  fieldpulse-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: fieldpulse-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - fieldpulse-api

volumes:
  fieldpulse_data:
    driver: local
